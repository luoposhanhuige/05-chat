    <h1>Server Sent Events</h1>

    <script lang="javascript">
      var source = new EventSource("/events");
      source.onmessage = function(event) {
        console.log("Got:", event.data);
      };
    </script>
  </body>

<!--
The highlighted JavaScript code uses the browser's built-in Server-Sent Events (SSE) API to establish a real-time, one-way connection from the server to the client.

Here is the line-by-line breakdown:

var source = new EventSource("/events");
This creates a new EventSource object. It automatically sends an HTTP GET request to the /events endpoint (your Axum sse_handler) and keeps the connection open indefinitely. It expects the server to stream data back in a specific text/event-stream format.

source.onmessage = function(event) { ... };
This registers an event listener callback. Whenever the Rust server pushes a new message down the open connection, the browser automatically fires this function.

console.log("Got:", event.data);
Inside the callback, event contains the data packet. event.data extracts the actual payload string (e.g., the "hi!" message from your Rust code) and logs it to the browser's Developer Tools console.
-->
